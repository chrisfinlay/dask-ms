[workspace]
name = "dask-ms"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64"]

# Shared base dependencies (from conda-forge)
[dependencies]
python = ">=3.10,<3.14"
python-casacore = ">=3.7.0"
numpy = ">=2.0.0"
appdirs = ">=1.4.4"
cacheout = ">=0.16.0"
donfig = ">=0.8.0"
pyarrow = ">=14.0.1"
pandas = ">=2.1.2"
pytest = ">=8.0.0"
pip = "*"

# ── old-dask: pinned below the breaking 2024.11.0 release ──────────────────
[feature.old-dask.dependencies]
dask = ">=2023.1.1,<2024.11.0"
fsspec = ">=2022.7.0,<2025.1.0"

[feature.old-dask.pypi-dependencies]
dask-ms = { path = ".", editable = true, extras = ["arrow", "testing"] }

# ── new-dask: post-TaskSpec refactor (2024.11.0+) ──────────────────────────
[feature.new-dask.dependencies]
dask = ">=2025.1.0"
fsspec = ">=2025.1.0"

[feature.new-dask.pypi-dependencies]
dask-ms = { path = ".", editable = true, extras = ["arrow", "testing"] }

# ── dev: linting / pre-commit ──────────────────────────────────────────────
[feature.dev.dependencies]
pre-commit = "*"
ruff = ">=0.1.3"

[environments]
old-dask = { features = ["old-dask"], solve-group = "old-dask" }
new-dask = { features = ["new-dask"], solve-group = "new-dask" }
dev = { features = ["dev"], solve-group = "dev", no-default-feature = true }

# ── Tasks ───────────────────────────────────────────────────────────────────
[tasks]
# Run just the optimisation tests (no casacore needed beyond import)
test-opt = { cmd = "pytest -xvs daskms/tests/test_optimisation.py" }
# Run tests that don't require a real MS file (no casacore IO)
test-fast = { cmd = "pytest -xvs daskms/tests/ -k 'not (table or ms_ or stress or executor)'" }
# Full test suite
test-all = { cmd = "pytest -xvs daskms/tests/" }
# Show dask version in the active environment
dask-version = { cmd = "python -c \"import dask; print(dask.__version__)\"" }

[feature.dev.tasks]
# Run all pre-commit hooks (auto-fixes in place)
lint = { cmd = "pre-commit run --all-files" }
# Format only with ruff (faster than full pre-commit)
fmt = { cmd = "ruff format daskms/" }
